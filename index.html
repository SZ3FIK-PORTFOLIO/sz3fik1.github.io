<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sz3fik | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* CANVAS */
#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
nav{
padding:30px 80px;
font-weight:800;
font-size:20px;
}

/* HERO */
.hero{
text-align:center;
margin-top:60px;
margin-bottom:80px;
}

.hero h1{
font-size:42px;
margin-bottom:15px;
}

.hero p{
color:#94a3b8;
}

/* GRID */
.section{
max-width:1300px;
margin:auto;
padding:0 40px 100px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
}

/* SYSTEM CARD */
.system-card{
position:relative;
height:240px;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:800;
letter-spacing:2px;
text-transform:uppercase;
}

.system-card::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at center,#3ba8ff33,transparent 70%);
animation:rotate 8s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.system-card span{
position:relative;
z-index:2;
}

/* Different colors */
.sklepy{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
box-shadow:0 0 40px #3b82f6aa;
}

.osiagniecia{
background:linear-gradient(135deg,#0f172a,#064e3b);
box-shadow:0 0 40px #10b981aa;
}

.afk{
background:linear-gradient(135deg,#0f172a,#7c2d12);
box-shadow:0 0 40px #f97316aa;
}

.skrzynki{
background:linear-gradient(135deg,#0f172a,#4c1d95);
box-shadow:0 0 40px #a855f7aa;
}

.system-card:hover{
transform:translateY(-10px) scale(1.05);
}

/* MODAL */
.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(6px);
}

.modal-content{
background:#0f172a;
margin:4% auto;
padding:30px;
border-radius:20px;
width:85%;
max-width:1200px;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.close{
float:right;
font-size:26px;
cursor:pointer;
}

.modal-body{
margin-top:20px;
display:flex;
gap:40px;
flex-wrap:wrap;
}

.modal-video{
flex:2;
}

.modal-info{
flex:1;
color:#cbd5e1;
line-height:1.6;
}

footer{
text-align:center;
padding:40px;
color:#64748b;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<nav>Sz3fik.</nav>

<div class="hero">
<h1>Minecraft Core System</h1>
<p>Kliknij system, aby zobaczyć demo działania.</p>
</div>

<div class="section">
<div class="grid">

<div class="system-card sklepy" onclick="openSystem('System Sklepów','IHQKqiSkw68','Zaawansowany system sklepów z kupowaniem i sprzedawaniem przedmiotów.')">
<span>SKLEPY</span>
</div>

<div class="system-card osiagniecia" onclick="openSystem('Osiągnięcia','VIDEO_ID_2','System nagród za wykonywanie zadań.')">
<span>OSIĄGNIĘCIA</span>
</div>

<div class="system-card afk" onclick="openSystem('Strefa AFK','VIDEO_ID_3','System AFK z nagrodami za przebywanie.')">
<span>STREFA AFK</span>
</div>

<div class="system-card skrzynki" onclick="openSystem('Skrzynki','VIDEO_ID_4','System skrzynek z losowym dropem.')">
<span>SKRZYNKI</span>
</div>

</div>
</div>

<!-- MODAL -->
<div id="systemModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<h2 id="modalTitle"></h2>

<div class="modal-body">
<div class="modal-video">
<iframe id="modalVideo" width="100%" height="400" src="" frameborder="0" allowfullscreen></iframe>
</div>
<div class="modal-info">
<p id="modalDescription"></p>
</div>
</div>
</div>
</div>

<footer>
© 2026 Sz3fik – Discord: patrys123_.
</footer>

<script>
function openSystem(title, videoId, description){
document.getElementById("systemModal").style.display="block";
document.getElementById("modalTitle").innerText=title;
document.getElementById("modalDescription").innerText=description;
document.getElementById("modalVideo").src="https://www.youtube.com/embed/"+videoId;
}

function closeModal(){
document.getElementById("systemModal").style.display="none";
document.getElementById("modalVideo").src="";
}

/* PARTICLES */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let i=0;i<particles.length;i++){
let p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#3ba8ff";
ctx.fill();
}
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
