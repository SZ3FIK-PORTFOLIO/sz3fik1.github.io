<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sz3fik | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#020617;
color:white;
overflow-x:hidden;
font-family:'Press Start 2P', cursive;
}

/* PARTICLE CANVAS */
#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
nav{
padding:30px 60px;
font-size:14px;
letter-spacing:2px;
}

/* HERO */
.hero{
text-align:center;
margin:60px 0 100px;
}

.hero h1{
font-size:28px;
margin-bottom:20px;
text-shadow:
0 0 5px #3ba8ff,
0 0 15px #3ba8ff,
0 0 30px #3ba8ff;
}

.hero p{
font-size:10px;
color:#94a3b8;
}

/* GRID */
.section{
max-width:1300px;
margin:auto;
padding:0 40px 120px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:60px;
}

/* SYSTEM CARD */
.system-card{
height:200px;
perspective:1000px;
cursor:pointer;
}

.system-inner{
height:100%;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
box-shadow:0 0 30px rgba(59,168,255,0.4);
transition:transform 0.2s ease, box-shadow 0.3s;
transform-style:preserve-3d;
}

.system-card span{
font-size:18px;
letter-spacing:3px;
text-transform:uppercase;
text-shadow:
0 0 5px #3ba8ff,
0 0 15px #3ba8ff,
0 0 30px #3ba8ff;
animation:popIn 0.6s ease forwards;
opacity:0;
}

@keyframes popIn{
to{opacity:1; transform:scale(1);}
from{opacity:0; transform:scale(0.7);}
}

.system-card:hover .system-inner{
box-shadow:0 0 50px #3ba8ff;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:opacity 0.3s ease;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-content{
background:#0f172a;
width:85%;
max-width:1100px;
border-radius:20px;
padding:30px;
transform:scale(0.8);
opacity:0;
transition:all 0.3s ease;
}

.modal.active .modal-content{
transform:scale(1);
opacity:1;
}

.close{
float:right;
font-size:20px;
cursor:pointer;
}

.modal-body{
margin-top:25px;
display:flex;
gap:40px;
flex-wrap:wrap;
}

.modal-video{
flex:2;
}

.modal-video iframe{
border-radius:15px;
}

.modal-info{
flex:1;
font-family:Arial;
color:#cbd5e1;
line-height:1.6;
}

footer{
text-align:center;
padding:40px;
color:#64748b;
font-family:Arial;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<nav>Sz3fik.</nav>

<div class="hero">
<h1>MINECRAFT CORE SYSTEM</h1>
<p>Kliknij system aby zobaczyć demo.</p>
</div>

<div class="section">
<div class="grid">

<div class="system-card" onclick="openSystem('System Sklepów','IHQKqiSkw68','Zaawansowany system sklepów z kupowaniem i sprzedawaniem przedmiotów.')">
<div class="system-inner"><span>SKLEPY</span></div>
</div>

<div class="system-card" onclick="openSystem('Osiągnięcia','Di2uOvIlrc8','System nagród za wykonywanie zadań.')">
<div class="system-inner"><span>OSIĄGNIĘCIA</span></div>
</div>

<div class="system-card" onclick="openSystem('Strefa AFK','VIDEO_ID_3','System AFK z nagrodami.')">
<div class="system-inner"><span>STREFA AFK</span></div>
</div>

<div class="system-card" onclick="openSystem('Skrzynki','EtKgwNAasmU','System skrzynek z losowym dropem.')">
<div class="system-inner"><span>SKRZYNKI</span></div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="systemModal" class="modal" onclick="outsideClick(event)">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2 id="modalTitle" style="margin-bottom:20px;"></h2>

<div class="modal-body">

<div class="modal-video">
<iframe id="modalVideo"
width="100%" height="400"
src=""
frameborder="0"
allowfullscreen></iframe>
</div>

<div class="modal-info">
<p id="modalDescription"></p>
</div>

</div>
</div>
</div>

<footer>
© 2026 Sz3fik – Discord: patrys123_.
</footer>

<script>
function openSystem(title, videoId, description){
const modal=document.getElementById("systemModal");
modal.classList.add("active");
document.getElementById("modalTitle").innerText=title;
document.getElementById("modalDescription").innerText=description;
document.getElementById("modalVideo").src="https://www.youtube.com/embed/"+videoId;
}

function closeModal(){
const modal=document.getElementById("systemModal");
modal.classList.remove("active");
document.getElementById("modalVideo").src="";
}

function outsideClick(e){
if(e.target.id==="systemModal"){
closeModal();
}
}

/* 3D TILT */
document.querySelectorAll('.system-card').forEach(card=>{
card.addEventListener('mousemove',(e)=>{
const inner=card.querySelector('.system-inner');
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const centerX=rect.width/2;
const centerY=rect.height/2;
const rotateX=(y-centerY)/15;
const rotateY=(centerX-x)/15;
inner.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});
card.addEventListener('mouseleave',()=>{
card.querySelector('.system-inner').style.transform="rotateX(0) rotateY(0)";
});
});

/* PARTICLES */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let p of particles){
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#3ba8ff";
ctx.fill();
}
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
